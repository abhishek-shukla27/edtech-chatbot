<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduBot – LearnSphere Support</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e2a;
    --border: #242836;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent-glow: rgba(108,99,255,0.18);
    --text: #e8eaf0;
    --text-muted: #7a7f96;
    --user-bubble: #6c63ff;
    --bot-bubble: #1a1e2a;
    --font: 'Sora', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 85%, rgba(0,212,170,0.06) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    background: rgba(13,15,20,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(108,99,255,0.35);
  }

  .brand-text h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .brand-text p {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.4px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    background: rgba(0,212,170,0.08);
    border: 1px solid rgba(0,212,170,0.2);
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--accent2);
    font-family: var(--mono);
  }

  .status-dot {
    width: 7px; height: 7px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* Chat area */
  #chat-container {
    position: relative;
    z-index: 1;
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  #chat-container::-webkit-scrollbar { width: 4px; }
  #chat-container::-webkit-scrollbar-track { background: transparent; }
  #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .msg-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    animation: slideUp 0.3s ease;
    max-width: 780px;
    margin: 0 auto;
    width: 100%;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px rgba(108,99,255,0.3);
  }

  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .bubble {
    padding: 13px 17px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 72%;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .bubble.user {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
    color: #fff;
    box-shadow: 0 4px 20px rgba(108,99,255,0.25);
  }

  .bubble strong { font-weight: 600; }

  /* Quick suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-width: 780px;
    margin: 0 auto;
    width: 100%;
    animation: slideUp 0.4s ease 0.15s both;
  }

  .chip {
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    font-size: 12.5px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
    transform: translateY(-1px);
  }

  /* Typing indicator */
  .typing-row {
    display: flex; gap: 12px; align-items: flex-end;
    max-width: 780px; margin: 0 auto; width: 100%;
    animation: slideUp 0.25s ease;
  }

  .typing-bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex; gap: 5px; align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Input area */
  #input-area {
    position: relative;
    z-index: 10;
    padding: 16px 20px 20px;
    background: rgba(13,15,20,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    max-width: 780px;
    margin: 0 auto;
    align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 120px;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.5;
  }

  #user-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.12);
  }

  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), #8b85ff);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(108,99,255,0.3);
  }

  #send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(108,99,255,0.45); }
  #send-btn:active { transform: scale(0.97); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 18px; height: 18px; fill: white; }

  .meta-line {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
    font-family: var(--mono);
    opacity: 0.6;
  }

  /* Welcome card */
  .welcome-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 28px 24px;
    max-width: 480px;
    margin: 10px auto 0;
    animation: slideUp 0.5s ease;
    text-align: center;
  }

  .welcome-icon {
    font-size: 36px;
    margin-bottom: 14px;
  }

  .welcome-card h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .welcome-card p {
    font-size: 13.5px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .tag-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    background: rgba(108,99,255,0.1);
    border: 1px solid rgba(108,99,255,0.2);
    padding: 4px 10px;
    border-radius: 6px;
  }

  /* Tokens badge */
  #tokens-badge {
    display: none;
    font-size: 10.5px;
    color: var(--text-muted);
    font-family: var(--mono);
    text-align: right;
    max-width: 780px;
    margin: -12px auto 0;
    padding-right: 4px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">🎓</div>
    <div class="brand-text">
      <h1>EduBot</h1>
      <p>LearnSphere · Customer Support</p>
    </div>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    Online 24/7
  </div>
</header>

<div id="chat-container">
  <div class="welcome-card">
    <div class="welcome-icon">👋</div>
    <h2>Hi, I'm EduBot!</h2>
    <p>Your personal support assistant for LearnSphere. I can help with course info, enrollment, payments, and more.</p>
    <div class="tag-row">
      <span class="tag">Courses</span>
      <span class="tag">Payments</span>
      <span class="tag">Enrollment</span>
      <span class="tag">Certificates</span>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="chip" onclick="quickSend(this)">📚 What courses do you offer?</button>
    <button class="chip" onclick="quickSend(this)">💳 What payment methods are accepted?</button>
    <button class="chip" onclick="quickSend(this)">🔁 What's your refund policy?</button>
    <button class="chip" onclick="quickSend(this)">🎓 How do I get my certificate?</button>
    <button class="chip" onclick="quickSend(this)">📦 Is there an EMI option?</button>
  </div>
</div>

<div id="tokens-badge"></div>

<div id="input-area">
  <div class="input-wrap">
    <textarea
      id="user-input"
      placeholder="Ask me about courses, payments, enrollment..."
      rows="1"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="meta-line">Powered by Llama 3.3 70B via Groq · LearnSphere Support</div>
</div>

<script>
  const chatEl = document.getElementById('chat-container');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const tokensBadge = document.getElementById('tokens-badge');
  let history = [];

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function quickSend(el) {
    const text = el.textContent.replace(/^[\p{Emoji}\s]+/u, '').trim();
    inputEl.value = text;
    document.getElementById('suggestions').style.display = 'none';
    sendMessage();
  }

  function addMessage(role, text) {
    const isUser = role === 'user';
    const row = document.createElement('div');
    row.className = `msg-row ${isUser ? 'user' : ''}`;

    const av = document.createElement('div');
    av.className = `avatar ${isUser ? 'user-av' : 'bot'}`;
    av.textContent = isUser ? '🧑' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${isUser ? 'user' : 'bot'}`;
    bubble.textContent = text;

    row.appendChild(av);
    row.appendChild(bubble);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing';
    row.innerHTML = `
      <div class="avatar bot">🤖</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    document.getElementById('suggestions').style.display = 'none';
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        addMessage('bot', '⚠️ ' + (data.detail || 'Something went wrong. Please try again.'));
      } else {
        addMessage('bot', data.reply);
        history.push({ role: 'assistant', content: data.reply });

        // Show token usage
        tokensBadge.style.display = 'block';
        tokensBadge.textContent = `↳ tokens used: ${data.tokens_used}`;
      }
    } catch (err) {
      removeTyping();
      addMessage('bot', '⚠️ Connection error. Make sure the server is running and GROQ_API_KEY is set.');
    }

    sendBtn.disabled = false;
    chatEl.scrollTop = chatEl.scrollHeight;
  }
</script>
</body>
</html>
